    try {
      const app = initializeApp(firebaseConfig);

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    const COLOR_PALETTES = [

        moon: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>,
        sun: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>,
        close: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>,
        settings: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>,
        info: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
        users: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
        calendar: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
        instructor: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 14l9-5-9-5-9 5 9 5z"></path><path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path><path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222"></path></svg>,
        grid: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>,
        clock: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
        check: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"></polyline></svg>,
        speaker: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><circle cx="12" cy="14" r="4"></circle><line x1="12" y1="6" x2="12.01" y2="6"></line></svg>,
        bell: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg>
      };
      return icons[name] || null;
    };

    const INITIAL_ROOMS = [
      { id: 'room-2', name: '2번방', color: 'pink', isActive: true },
      { id: 'room-3', name: '3번방', color: 'emerald', isActive: true },
      { id: 'room-5', name: '5번방', color: 'amber', isActive: true },
      { id: 'room-6', name: '6번방', color: 'sky', isActive: true },
      { id: 'room-7', name: '7번방', color: 'purple', isActive: true },
      { id: 'room-8', name: '8번방', color: 'rose', isActive: true },
      { id: 'room-9', name: '9번방', color: 'slate', isActive: true },
    ];

    const INITIAL_SPACE_ROOMS = [
      { id: 'space-1', name: '합주실 A', color: 'indigo', isActive: true },
      { id: 'space-2', name: '합주실 B', color: 'emerald', isActive: true },
    ];

    const START_TIME_OPTIONS = [];
    for(let i = 20; i <= 40; i++) {
      const h = String(Math.floor(i / 2)).padStart(2, '0');
      const m = i % 2 === 0 ? '00' : '30';
      START_TIME_OPTIONS.push(`${h}:${m}`);
    }

    const END_TIME_OPTIONS = [];
    for(let i = 22; i <= 42; i++) {
      const h = String(Math.floor(i / 2)).padStart(2, '0');
      const m = i % 2 === 0 ? '00' : '30';
      END_TIME_OPTIONS.push(`${h}:${m}`);
    }
    
    // 공간메이킹은 정각(1시간 단위)만 선택 가능
    const SPACE_TIME_OPTIONS = [];
    for(let i = 10; i <= 22; i++) {
      SPACE_TIME_OPTIONS.push(`${String(i).padStart(2, '0')}:00`);
    }
    const SPACE_END_TIME_OPTIONS = [];
    for(let i = 11; i <= 23; i++) {
      SPACE_END_TIME_OPTIONS.push(`${String(i).padStart(2, '0')}:00`);
    }

    const GRID_TIME_SLOTS = [];
    for(let i = 20; i <= 41; i++) {
      const h = String(Math.floor(i / 2)).padStart(2, '0');
      const m = i % 2 === 0 ? '00' : '30';
      GRID_TIME_SLOTS.push(`${h}:${m}`);
    }

    const WORKING_DAYS = [
      { label: '월', value: 1 }, { label: '화', value: 2 }, { label: '수', value: 3 },
      { label: '목', value: 4 }, { label: '금', value: 5 }, { label: '토', value: 6 }
    ];

    const DEFAULT_INSTRUCTOR_CATEGORIES = ['보컬', '드럼', '피아노', '피아노/작곡/미디', '베이스/녹음/미디', '베이스/어쿠스틱/기타', '어쿠스틱/일렉기타'];

    function App() {
      // Session Storage를 이용한 로그인 유지
      const [isAdmin, setIsAdmin] = useState(() => sessionStorage.getItem('mayking_isAdmin') === 'true');
      const [loggedInUser, setLoggedInUser] = useState(() => {
        const storedUser = sessionStorage.getItem('mayking_loggedInUser');
        return storedUser ? JSON.parse(storedUser) : null;
      });

      const [currentDate, setCurrentDate] = useState(new Date());
      const [rooms, setRooms] = useState(INITIAL_ROOMS);
      const [spaceRooms, setSpaceRooms] = useState(INITIAL_SPACE_ROOMS);
      const [events, setEvents] = useState([]); 
      const [users, setUsers] = useState([]); 
      const [instructors, setInstructors] = useState([]); 
      const [categories, setCategories] = useState(DEFAULT_INSTRUCTOR_CATEGORIES); 
      const [notice, setNotice] = useState(''); 
      const [notifications, setNotifications] = useState([]); 
      const [adminPw, setAdminPw] = useState('0000');
      
      const [searchQuery, setSearchQuery] = useState('');
      const [darkMode, setDarkMode] = useState(false);
      const [toastMessage, setToastMessage] = useState(null);
      const [currentView, setCurrentView] = useState(() => sessionStorage.getItem('mayking_currentView') || 'landing'); 
      useEffect(() => {
        sessionStorage.setItem('mayking_currentView', currentView);
      }, [currentView]);

      const [isProfileMenuOpen, setIsProfileMenuOpen] = useState(false); // 로그아웃 메뉴용 상태
      const [isLoginModalOpen, setIsLoginModalOpen] = useState(false);

      const [isEventModalOpen, setIsEventModalOpen] = useState(false);
      const [selectedEvent, setSelectedEvent] = useState(null);
      const [selectedDay, setSelectedDay] = useState(null);
      const [isDayListModalOpen, setIsDayListModalOpen] = useState(false);
      const [isRoomModalOpen, setIsRoomModalOpen] = useState(false);
      
      const [isNotiModalOpen, setIsNotiModalOpen] = useState(false);
      const [isInstructorSettingsOpen, setIsInstructorSettingsOpen] = useState(false);
      const [isAdminSettingsOpen, setIsAdminSettingsOpen] = useState(false);
      const [instructorSettingsTab, setInstructorSettingsTab] = useState('info'); 

      const [adminTab, setAdminTab] = useState('students'); 
      const [adminListMode, setAdminListMode] = useState('list');
      const [selectedInstructorForManage, setSelectedInstructorForManage] = useState(null);
      const [isCategoryModalOpen, setIsCategoryModalOpen] = useState(false);
      
      const [selectedAccountForEdit, setSelectedAccountForEdit] = useState(null);
      const [accountDeleteConfirm, setAccountDeleteConfirm] = useState(false);

      const [assignInstId, setAssignInstId] = useState('');
      const [formDateStr, setFormDateStr] = useState('');
      const [formStartTime, setFormStartTime] = useState('10:00');
      const [formEndTime, setFormEndTime] = useState('11:00');

      // 강사 스케줄 관리용 클릭-투-클릭 상태 유지
      const [lastClickAnchor, setLastClickAnchor] = useState(null);

      useEffect(() => {
        if (!window.firebaseDb) return;
        const docRef = window.firebaseDoc(window.firebaseDb, "wm_calendar", "making_academy_data");
        const unsubscribe = window.firebaseOnSnapshot(docRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.events) setEvents(data.events);
            if (data.users) setUsers(data.users);
            if (data.instructors) setInstructors(data.instructors.map(i => ({...i, availability: i.availability || {}})));
            if (data.categories) setCategories(data.categories);
            if (data.notice !== undefined) setNotice(data.notice);
            if (data.spaceRooms) setSpaceRooms(data.spaceRooms);
            if (data.notifications) setNotifications(data.notifications);
            if (data.adminPw) setAdminPw(data.adminPw);
            if (data.rooms) {
              const filteredRooms = data.rooms.filter(r => r.id !== 'room-1');
              setRooms(filteredRooms);
            }
          } else {
            window.firebaseSetDoc(docRef, { events: [], rooms: INITIAL_ROOMS, spaceRooms: INITIAL_SPACE_ROOMS, users: [], instructors: [], categories: DEFAULT_INSTRUCTOR_CATEGORIES, notice: '', notifications: [], adminPw: '0000' });
          }
        }, (error) => console.error(error));
        return () => unsubscribe();
      }, []);

      const saveToCloud = async (updates) => {
        if (!window.firebaseDb) return;
        try {
          const docRef = window.firebaseDoc(window.firebaseDb, "wm_calendar", "making_academy_data");
          await window.firebaseSetDoc(docRef, updates, { merge: true });
        } catch (e) { showToast("⚠️ 서버 저장에 실패했습니다."); }
      };

      const addSystemNotification = (msg) => {
        const newNoti = { id: Date.now(), msg, createdAt: new Date().toLocaleString() };
        const nextNotis = [newNoti, ...notifications].slice(0, 50);
        setNotifications(nextNotis);
        saveToCloud({ notifications: nextNotis });
      };

      const activeRooms = useMemo(() => rooms.filter(r => r.isActive !== false), [rooms]);
      const activeSpaceRooms = useMemo(() => spaceRooms.filter(r => r.isActive !== false), [spaceRooms]);

      useEffect(() => {
        if (darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [darkMode]);

      const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(null), 3500); };

      const handleLogout = () => {
        setIsAdmin(false); setLoggedInUser(null); setCurrentView('landing');
        sessionStorage.removeItem('mayking_isAdmin');
        sessionStorage.removeItem('mayking_loggedInUser');
        sessionStorage.removeItem('mayking_currentView'); // 닫기 전 화면 기억도 깔끔하게 초기화
        showToast("안전하게 로그아웃 되었습니다.");
      };

      const handleSaveNotice = (newNotice) => {
        setNotice(newNotice); saveToCloud({ notice: newNotice });
      };

      const handleSaveAccount = (accountData, role) => {
        if (role === 'student') {
          if (users.some(u => u.id === accountData.id)) return showToast("⚠️ 이미 존재하는 아이디입니다.");
          const nextUsers = [...users, accountData];
          setUsers(nextUsers); saveToCloud({ users: nextUsers });
          showToast("원생 계정이 생성되었습니다.");
        } else {
          if (instructors.some(u => u.id === accountData.id)) return showToast("⚠️ 이미 존재하는 아이디입니다.");
          const newInstructor = { ...accountData, availability: {} };
          const nextInstructors = [...instructors, newInstructor];
          setInstructors(nextInstructors); saveToCloud({ instructors: nextInstructors });
          showToast("강사 계정이 생성되었습니다.");
        }
        setAdminListMode('list');
      };

      const handleUpdateAccount = (id, updatedData, role) => {
        if (role === 'student') {
          const nextUsers = users.map(u => u.id === id ? { ...u, ...updatedData } : u);
          setUsers(nextUsers); saveToCloud({ users: nextUsers });
          if(loggedInUser?.id === id) {
             const updated = {...loggedInUser, ...updatedData};
             setLoggedInUser(updated);
             sessionStorage.setItem('mayking_loggedInUser', JSON.stringify(updated));
          }
        } else {
          const nextInst = instructors.map(i => i.id === id ? { ...i, ...updatedData } : i);
          setInstructors(nextInst); saveToCloud({ instructors: nextInst });
          if(loggedInUser?.id === id) {
             const updated = {...loggedInUser, ...updatedData};
             setLoggedInUser(updated);
             sessionStorage.setItem('mayking_loggedInUser', JSON.stringify(updated));
          }
        }
        showToast("계정 정보가 업데이트 되었습니다.");
        setSelectedAccountForEdit(null);
        setAccountDeleteConfirm(false);
      };

      const handleDeleteAccount = (id, role) => {
        if (role === 'student') {
          const nextUsers = users.filter(u => u.id !== id);
          setUsers(nextUsers); saveToCloud({ users: nextUsers });
          showToast("계정이 삭제되었습니다.");
        } else {
          const nextInstructors = instructors.filter(u => u.id !== id);
          setInstructors(nextInstructors); saveToCloud({ instructors: nextInstructors });
          showToast("계정이 삭제되었습니다.");
        }
        setSelectedAccountForEdit(null);
        setAccountDeleteConfirm(false);
      };

      const handleAddCategory = (newCategory) => {
        if(categories.includes(newCategory)) return showToast("⚠️ 이미 존재하는 과목입니다.");
        const nextCats = [...categories, newCategory];
        setCategories(nextCats); saveToCloud({ categories: nextCats });
        showToast("과목이 추가되었습니다.");
      }

      // 클릭-투-클릭 범위 선택 로직
      const handleTimeCellClick = (instructorId, dayValue, timeIndex) => {
          const timeStr = GRID_TIME_SLOTS[timeIndex];
          const instData = instructors.find(i => i.id === instructorId);
          if (!instData) return;

          const currentAvail = instData.availability?.[`${dayValue}-${timeStr}`] || false;

          if (lastClickAnchor && lastClickAnchor.instructorId === instructorId && lastClickAnchor.day === dayValue) {
              // 두 번째 클릭: 범위 설정
              const minIdx = Math.min(lastClickAnchor.index, timeIndex);
              const maxIdx = Math.max(lastClickAnchor.index, timeIndex);
              const updates = {};
              for(let i = minIdx; i <= maxIdx; i++) {
                  updates[`${dayValue}-${GRID_TIME_SLOTS[i]}`] = lastClickAnchor.mode;
              }
              
              const nextInstructors = instructors.map(inst => {
                  if (inst.id === instructorId) {
                      return { ...inst, availability: { ...(inst.availability || {}), ...updates } };
                  }
                  return inst;
              });
              setInstructors(nextInstructors);
              saveToCloud({ instructors: nextInstructors });
              setLastClickAnchor(null); 
              
              // 알림 전송 (강사가 본인 정보 수정 시)
              if (!isAdmin) {
                  addSystemNotification(`[강사알림] ${instData.name} 강사님이 수업 스케줄을 변경했습니다.`);
              }
          } else {
              // 첫 번째 클릭: 앵커 설정
              const newMode = !currentAvail;
              const nextInstructors = instructors.map(inst => {
                  if (inst.id === instructorId) {
                      return { ...inst, availability: { ...(inst.availability || {}), [`${dayValue}-${timeStr}`]: newMode } };
                  }
                  return inst;
              });
              setInstructors(nextInstructors);
              saveToCloud({ instructors: nextInstructors });
              
              setLastClickAnchor({ instructorId, day: dayValue, index: timeIndex, mode: newMode });
          }
      };

      const handleSaveEvent = (payload) => {
        if (payload.startTime >= payload.endTime) return showToast("⚠️ 종료 시간은 시작 시간보다 늦어야 합니다.");
        
        const hasConflict = events.some(ev => {
          if (ev.roomId !== payload.roomId) return false;
          if (selectedEvent && ev.id === selectedEvent.id) return false;
          
          let dateOverlap = false;
          if(ev.type === 'class' && payload.type === 'class') dateOverlap = ev.dayOfWeek === payload.dayOfWeek;
          else if(ev.type !== 'class' && payload.type !== 'class') dateOverlap = ev.date === payload.date;
          else if(ev.type === 'class' && payload.type !== 'class') dateOverlap = ev.dayOfWeek === new Date(payload.date).getDay();
          else if(ev.type !== 'class' && payload.type === 'class') dateOverlap = new Date(ev.date).getDay() === payload.dayOfWeek;

          if(!dateOverlap) return false;
          return ev.startTime < payload.endTime && ev.endTime > payload.startTime;
        });

        if (hasConflict) return showToast("⚠️ 해당 시간에 이미 수업이나 예약이 존재합니다.");

        // Clean payload (remove undefined values for Firestore)
        const cleanPayload = Object.fromEntries(Object.entries(payload).filter(([_, v]) => v !== undefined));

        let nextEvents;
        let logMsg = "";
        const targetRooms = cleanPayload.type === 'space_reservation' ? spaceRooms : rooms;
        const roomName = targetRooms.find(r => r.id === cleanPayload.roomId)?.name || '알수없음';

        if (selectedEvent && selectedEvent.id) {
          nextEvents = events.map(ev => ev.id === selectedEvent.id ? { ...ev, ...cleanPayload } : ev);
          showToast("📝 일정이 성공적으로 수정되었습니다.");
          if (!isAdmin && cleanPayload.type !== 'class') {
             logMsg = `[예약수정] ${loggedInUser?.name || '익명'}님이 ${cleanPayload.date} ${cleanPayload.startTime} [${roomName}] 예약을 수정했습니다.`;
          }
        } else {
          const newEvent = { ...cleanPayload, id: `evt-${Date.now()}` };
          nextEvents = [...events, newEvent];
          showToast("📅 새 일정이 등록되었습니다.");
          if (!isAdmin && cleanPayload.type !== 'class') {
             logMsg = `[신규예약] ${loggedInUser?.name || '익명'}님이 ${cleanPayload.date} ${cleanPayload.startTime} [${roomName}] 공간을 예약했습니다.`;
          }
        }

        setEvents(nextEvents); 
        saveToCloud({ events: nextEvents });
        if(logMsg) addSystemNotification(logMsg);

        setIsEventModalOpen(false); setSelectedEvent(null);
      };

      const handleDeleteEvent = (id) => {
        const evToDelete = events.find(e => e.id === id);
        const nextEvents = events.filter(ev => ev.id !== id);
        setEvents(nextEvents); 
        saveToCloud({ events: nextEvents });
        showToast("🗑️ 취소 및 삭제가 완료되었습니다."); 
        
        if (!isAdmin && evToDelete && evToDelete.type !== 'class') {
           const targetRooms = evToDelete.type === 'space_reservation' ? spaceRooms : rooms;
           const roomName = targetRooms.find(r => r.id === evToDelete.roomId)?.name || '알수없음';
           addSystemNotification(`[예약취소] ${loggedInUser?.name || '익명'}님이 ${evToDelete.date} ${evToDelete.startTime} [${roomName}] 예약을 취소했습니다.`);

      };

      const toggleRoomActive = (roomId, isSpace = false) => {
        if (isSpace) {
          const nextSpaces = spaceRooms.map(r => r.id === roomId ? {...r, isActive: r.isActive === false ? true : false} : r);
          setSpaceRooms(nextSpaces); saveToCloud({ spaceRooms: nextSpaces });
        } else {
          const nextRooms = rooms.map(r => r.id === roomId ? {...r, isActive: r.isActive === false ? true : false} : r);
          setRooms(nextRooms); saveToCloud({ rooms: nextRooms });
        }
      }

      const filteredEvents = useMemo(() => {
        return events.filter(event => {
          if (currentView === 'calendar' && event.type === 'space_reservation') return false;
          if (currentView === 'space_calendar' && event.type !== 'space_reservation') return false;

          const searchMatch = searchQuery.trim() === '' || event.title.toLowerCase().includes(searchQuery.toLowerCase()) || (event.desc && event.desc.toLowerCase().includes(searchQuery.toLowerCase()));
          return searchMatch; 
        });
      }, [events, currentView, searchQuery]);

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const handlePrevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const handleNextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
      const handleToday = () => setCurrentDate(new Date());

      const calendarCells = useMemo(() => {
        let cells = [];
        let curr = new Date(year, month, 1);
        
        // 공간메이킹은 일요일(0) 시작, 연습실은 월요일(1) 시작
        const startDayTarget = currentView === 'space_calendar' ? 0 : 1;

        while (curr.getDay() !== startDayTarget) {
            curr.setDate(curr.getDate() - 1);
        }
        
        while (true) {
            // 연습실은 일요일(0) 제외, 공간메이킹은 포함
            if (currentView === 'space_calendar' || curr.getDay() !== 0) { 
                const y = curr.getFullYear();
                const m = curr.getMonth();
                const d = curr.getDate();
                const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                cells.push({
                    dateStr, day: d, isCurrentMonth: m === month, 
                    isToday: y === new Date().getFullYear() && m === new Date().getMonth() && d === new Date().getDate()
                });
            }
            curr.setDate(curr.getDate() + 1);
            
            if (curr.getMonth() !== month && curr.getFullYear() >= year && curr.getDay() === startDayTarget) {
                break;
            }
        }
        return cells;
      }, [year, month, currentView]);

      const sortedEventsForCalendar = useMemo(() => {
        return [...filteredEvents].sort((a, b) => {
           return (a.startTime || '').localeCompare(b.startTime || '');
        });
      }, [filteredEvents]);

      const todayStr = useMemo(() => {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }, [currentDate]);

      const todayEvents = useMemo(() => {
        const todayDayOfWeek = new Date().getDay();
        return events.filter(ev => {
          if (ev.type === 'space_reservation') return currentView === 'space_calendar' && ev.date === todayStr;
          if (currentView === 'space_calendar') return false; 
          if (ev.type === 'class') return ev.dayOfWeek === todayDayOfWeek;
          return ev.date === todayStr;

      }, [events, todayStr, currentView]);

        const targetRooms = isSpace ? spaceRooms : rooms;

              {darkMode ? <SvgIcon name="sun" className="w-5 h-5 md:w-4 md:h-4" /> : <SvgIcon name="moon" className="w-5 h-5 md:w-4 md:h-4" />}
            </button>

          {/* 랜딩(메인) 화면 */}
          {currentView === 'landing' ? (
            <div className="w-full h-full overflow-y-auto bg-white dark:bg-neutral-950 relative">
              
              {/* 관리자 알림 센터 아이콘 - 좌측 상단으로 분리 */}
              {isAdmin && (
                <div className="absolute top-6 left-6 z-[100]">
                  <button onClick={() => setIsNotiModalOpen(true)} className="relative p-2 md:p-2.5 rounded-full bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 text-neutral-600 dark:text-neutral-300 shadow-sm hover:scale-105 active:scale-95 transition-all">
                    <SvgIcon name="bell" className="w-5 h-5 md:w-4 md:h-4" />
                    {notifications.length > 0 && <span className="absolute top-0 right-0 w-2.5 h-2.5 bg-red-500 rounded-full border border-white dark:border-neutral-900 animate-pulse"></span>}
                  </button>
                </div>
              )}

              {/* 상단 메뉴: 우측 상단 고정 */}
              <div className="absolute top-6 right-6 flex items-center justify-end gap-2.5 md:gap-3 z-[100]">
                {loggedInUser || isAdmin ? (
                  <div className="flex items-center gap-2 md:gap-3">
                    <div className="relative">
                      <button onClick={() => setIsProfileMenuOpen(!isProfileMenuOpen)} className={`text-[10px] md:text-xs font-bold px-3 py-1.5 rounded-full border shadow-sm flex items-center gap-1.5 ${isAdmin ? 'bg-indigo-50 text-indigo-700 border-indigo-200 dark:bg-indigo-900/30 dark:border-indigo-800/60' : loggedInUser.role === 'instructor' ? 'bg-purple-50 text-purple-700 border-purple-200 dark:bg-purple-900/30 dark:border-purple-800/60' : 'bg-emerald-50 text-emerald-700 border-emerald-200 dark:bg-emerald-900/30 dark:border-emerald-800/60'}`}>
                        <SvgIcon name={isAdmin ? 'settings' : loggedInUser.role === 'instructor' ? 'instructor' : 'users'} className="w-4 h-4" />
                        <span className="hidden sm:inline">{isAdmin ? '메이킹님 (관리자)' : `${loggedInUser.name}${loggedInUser.role === 'instructor' ? 'T' : ''}님`}</span>
                        <span className="sm:hidden">{isAdmin ? '관리자' : `${loggedInUser.name}`}</span>
                      </button>
                      
                      {isProfileMenuOpen && (
                        <React.Fragment>
                          <div className="fixed inset-0 z-[105]" onClick={() => setIsProfileMenuOpen(false)}></div>
                          <div className="absolute top-full right-0 mt-2 w-28 bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-xl shadow-xl overflow-hidden flex flex-col z-[110]">
                            <button onClick={() => { setIsProfileMenuOpen(false); handleLogout(); }} className="px-4 py-3 text-xs font-bold text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 text-center transition-colors">
                              로그아웃

                    <button onClick={() => {
                      if(isAdmin) setIsAdminSettingsOpen(true);
                      else if(loggedInUser?.role === 'student') return showToast("원생은 직접 정보를 수정할 수 없습니다. 관리자(원장님)에게 문의하세요.");
                      else setIsInstructorSettingsOpen(true);

                      <SvgIcon name="settings" className="w-4 h-4" />
                    </button>
                  </div>
                ) : (
                  <button onClick={() => setIsLoginModalOpen(true)} className="px-4 md:px-6 py-2 md:py-2.5 rounded-full bg-neutral-900 dark:bg-white text-white dark:text-neutral-900 text-[10px] md:text-xs font-bold shadow-lg hover:scale-105 active:scale-95 transition-all flex items-center gap-2">
                    <SvgIcon name="users" className="w-4 h-4" /> 시스템 로그인
                  </button>

              </div>

              <div className="min-h-[100dvh] w-full flex flex-col items-center justify-center py-20 px-6 max-w-4xl mx-auto relative z-10">
                <div className="text-center mb-10 md:mb-14 mt-12">

                  <h1 className="font-black text-4xl md:text-5xl tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-neutral-900 to-neutral-500 dark:from-white dark:to-neutral-400 leading-tight mb-3">
                    메이킹(M.A.Y.KING)<br className="block sm:hidden" /> 실용음악학원
                  </h1>
                  <p className="text-neutral-500 dark:text-neutral-400 font-bold tracking-[0.25em] uppercase text-sm">통합 시스템</p>

                    <div className="w-14 h-14 rounded-2xl bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">

                                      key={key} 
                                      onClick={() => handleTimeCellClick(targetInstId, day.value, timeIndex)}
                                      className={`border-r last:border-r-0 border-neutral-100 dark:border-neutral-800/50 p-1 md:p-1.5 cursor-pointer toggle-cell flex items-center justify-center group ${isAvailable ? 'bg-emerald-50 dark:bg-emerald-900/20' : ''} ${isAnchor ? 'ring-2 ring-inset ring-indigo-500 bg-indigo-50 dark:bg-indigo-900/40' : ''}`}
                                    >
                                      <div className={`w-full h-full min-h-[24px] md:min-h-[28px] rounded-md border flex items-center justify-center transition-all ${isAvailable ? 'bg-emerald-500 border-emerald-600 text-white shadow-inner scale-100' : 'border-transparent text-transparent group-hover:border-neutral-200 dark:group-hover:border-neutral-700 scale-95'} ${isAnchor ? 'animate-pulse' : ''}`}>
                                        {isAvailable && <SvgIcon name="check" className="w-3 md:w-4 h-3 md:h-4" />}
                                      </div>
                                    </div>
                                  )
                                })}
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 관리자 알림 센터 팝업 */}
          {isNotiModalOpen && isAdmin && (
            <div className="fixed inset-0 bg-neutral-900/60 dark:bg-neutral-950/80 backdrop-blur-sm flex items-start justify-center pt-20 p-4" style={{ zIndex: 9999 }}>
              <div className="bg-white dark:bg-neutral-900 rounded-2xl border border-neutral-200 dark:border-neutral-800 w-full max-w-md shadow-2xl flex flex-col max-h-[70vh]">
                <div className="flex items-center justify-between border-b border-neutral-100 dark:border-neutral-800 p-5 shrink-0">
                  <h3 className="font-bold text-lg flex items-center gap-2"><SvgIcon name="bell" className="w-5 h-5 text-indigo-500" /> 관리자 알림 센터</h3>
                  <button onClick={() => setIsNotiModalOpen(false)} className="p-1 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-md text-neutral-400"><SvgIcon name="close" className="w-5 h-5" /></button>
                </div>
                <div className="flex-1 overflow-y-auto p-3 space-y-2 hide-scrollbar">
                  {notifications.length === 0 ? (
                    <div className="text-center py-10 text-sm text-neutral-400">새로운 알림이 없습니다.</div>
                  ) : notifications.map(noti => (
                    <div key={noti.id} className="p-3 bg-neutral-50 dark:bg-neutral-850 rounded-xl border border-neutral-100 dark:border-neutral-800">
                      <p className="text-xs font-bold text-neutral-800 dark:text-neutral-200 mb-1">{noti.msg}</p>
                      <span className="text-[10px] text-neutral-400">{noti.createdAt}</span>
                    </div>
                  ))}
                </div>
                {notifications.length > 0 && (
                   <div className="p-3 border-t border-neutral-100 dark:border-neutral-800 shrink-0">
                     <button onClick={() => { setNotifications([]); saveToCloud({ notifications: [] }); }} className="w-full py-2 text-xs font-bold text-neutral-500 hover:text-neutral-800 bg-neutral-100 hover:bg-neutral-200 dark:bg-neutral-800 dark:hover:bg-neutral-700 rounded-lg transition-colors">전체 알림 지우기</button>
                   </div>
                )}
              </div>
            </div>
          )}

          {/* 방 관리(ON/OFF) 팝업 */}
          {isRoomModalOpen && (
            <div className="fixed inset-0 bg-neutral-900/60 dark:bg-neutral-950/80 backdrop-blur-sm flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
              <div className="bg-white dark:bg-neutral-900 rounded-xl border border-neutral-200 dark:border-neutral-800 p-5 w-full max-w-sm shadow-2xl overflow-hidden flex flex-col max-h-[85vh]">
                <div className="flex flex-col h-full overflow-hidden">
                  <div className="flex items-center justify-between border-b border-neutral-100 dark:border-neutral-800 pb-3 mb-4 shrink-0">
                    <h3 className="font-bold text-sm">{currentView === 'space_calendar' ? '공간/합주실 상태 관리' : '연습실 상태 관리 (ON/OFF)'}</h3>
                    <button onClick={() => setIsRoomModalOpen(false)} className="p-1 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-md text-neutral-400">
                      <SvgIcon name="close" className="w-4 h-4" />
                    </button>
                  </div>
                  
                  <div className="overflow-y-auto space-y-2 pr-1 hide-scrollbar">
                    {(currentView === 'space_calendar' ? spaceRooms : rooms).map(r => (
                      <div key={r.id} className="flex justify-between items-center p-3 border border-neutral-200 dark:border-neutral-800 rounded-xl bg-neutral-50/50 dark:bg-neutral-850/50">
                        <div className="flex items-center gap-2">
                          <span className="w-3 h-3 rounded-full" style={{ backgroundColor: COLOR_PALETTES.find(p=>p.id===r.color)?.hex || '#ccc'}}></span>
                          <span className={`text-xs font-bold ${r.isActive === false ? 'text-neutral-400 line-through' : 'text-neutral-800 dark:text-white'}`}>{r.name}</span>
                        </div>
                        <button onClick={() => toggleRoomActive(r.id, currentView === 'space_calendar')} className={`relative inline-flex h-5 w-9 items-center rounded-full transition-colors focus:outline-none ${r.isActive !== false ? 'bg-indigo-500' : 'bg-neutral-300 dark:bg-neutral-700'}`}>
                           <span className={`inline-block h-3.5 w-3.5 transform rounded-full bg-white transition-transform`} style={{ transform: r.isActive !== false ? 'translateX(18px)' : 'translateX(4px)' }}/>
                        </button>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 계정 상세 수정 팝업 */}
          {selectedAccountForEdit && (
            <div className="fixed inset-0 bg-neutral-900/60 dark:bg-neutral-950/80 backdrop-blur-sm flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
              <div className="bg-white dark:bg-neutral-900 rounded-2xl border border-neutral-200 dark:border-neutral-800 w-full max-w-md shadow-2xl max-h-[95vh] flex flex-col">
                <div className="flex items-center justify-between border-b border-neutral-100 dark:border-neutral-800 p-5 shrink-0">
                  <h3 className="font-bold text-lg">{selectedAccountForEdit.role === 'student' ? '원생 계정 상세 설정' : '강사 계정 상세 설정'}</h3>
                  <button onClick={() => { setSelectedAccountForEdit(null); setAccountDeleteConfirm(false); }} className="p-1 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-md text-neutral-400"><SvgIcon name="close" className="w-5 h-5" /></button>
                </div>
                
                <div className="flex-1 overflow-y-auto hide-scrollbar p-5 space-y-6">
                  <form onSubmit={(e) => {
                      e.preventDefault();
                      const formData = new FormData(e.target);
                      handleUpdateAccount(selectedAccountForEdit.id, {
                        name: formData.get('name').trim(),
                        password: formData.get('password').trim(),
                        ...(selectedAccountForEdit.role === 'instructor' ? { category: formData.get('category') } : {})
                      }, selectedAccountForEdit.role);
                    }} className="space-y-4 border-b border-neutral-100 dark:border-neutral-800 pb-6"
                  >
                    <div>
                      <label className="block text-[11px] font-bold text-neutral-500 mb-1.5 ml-0.5">계정 ID (수정불가)</label>
                      <input type="text" value={selectedAccountForEdit.id} disabled className="w-full px-4 py-2 bg-neutral-100 dark:bg-neutral-850 border border-neutral-200 dark:border-neutral-700 rounded-xl text-sm text-neutral-500 outline-none" />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-neutral-500 mb-1.5 ml-0.5">실명 (이름)</label>
                      <input type="text" name="name" defaultValue={selectedAccountForEdit.name} required className="w-full px-4 py-2 bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-xl text-sm outline-none focus:border-indigo-500" />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-neutral-500 mb-1.5 ml-0.5">비밀번호 재설정</label>
                      <input type="text" name="password" defaultValue={selectedAccountForEdit.password} required className="w-full px-4 py-2 bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-xl text-sm outline-none focus:border-indigo-500" />
                    </div>
                    {selectedAccountForEdit.role === 'instructor' && (
                      <div>
                        <label className="block text-[11px] font-bold text-neutral-500 mb-1.5 ml-0.5">강사 과목 (전공)</label>
                        <select name="category" defaultValue={selectedAccountForEdit.category} className="w-full px-4 py-2 bg-neutral-50 dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-700 rounded-xl text-sm outline-none focus:border-purple-500">
                          {categories.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                      </div>
                    )}
                    <div className="flex justify-between items-center pt-2">
                      <button type="button" 
                        onClick={() => { 
                          if(!accountDeleteConfirm) setAccountDeleteConfirm(true); 
                          else handleDeleteAccount(selectedAccountForEdit.id, selectedAccountForEdit.role); 
                        }} 
                        onMouseLeave={() => setAccountDeleteConfirm(false)}
                        className={`px-4 py-2 text-xs font-bold rounded-lg transition-colors ${accountDeleteConfirm ? 'bg-red-600 text-white shadow-sm' : 'text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20'}`}>
                        {accountDeleteConfirm ? '클릭하여 삭제 확정' : '계정 영구삭제'}
                      </button>
                      <button type="submit" className="px-5 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow-sm">정보 수정 저장</button>
                    </div>
                  </form>

                  <div>
                    <h4 className="text-xs font-bold text-neutral-800 dark:text-neutral-200 mb-3 flex items-center gap-1.5"><SvgIcon name="calendar" className="w-4 h-4 text-emerald-500" /> 배정된 정규 수업</h4>
                    <div className="space-y-2">
                      {(() => {
                        const assignedClasses = events.filter(ev => ev.type === 'class' && (selectedAccountForEdit.role === 'student' ? ev.studentId === selectedAccountForEdit.id : ev.instructorId === selectedAccountForEdit.id));
                        if(assignedClasses.length === 0) return <div className="text-center text-[11px] text-neutral-400 py-4 bg-neutral-50 dark:bg-neutral-800/30 rounded-lg">배정된 수업이 없습니다.</div>;
                        return assignedClasses.map(ev => {
                          const oppName = selectedAccountForEdit.role === 'student' ? (instructors.find(i=>i.id===ev.instructorId)?.name + 'T') : (users.find(u=>u.id===ev.studentId)?.name + ' 학생');
                          return (
                            <div key={ev.id} className="p-3 bg-neutral-50 dark:bg-neutral-850 border border-neutral-200 dark:border-neutral-700 rounded-xl flex items-center justify-between">
                              <div>
                                <div className="text-[10px] font-bold text-emerald-600 dark:text-emerald-400 mb-0.5">매주 {WORKING_DAYS.find(d=>d.value===ev.dayOfWeek)?.label}요일 {ev.startTime}~{ev.endTime}</div>
                                <div className="text-xs font-semibold">{oppName}</div>
                              </div>
                              <button onClick={() => handleDeleteEvent(ev.id)} className="p-1.5 text-neutral-400 hover:bg-red-50 hover:text-red-500 rounded-md transition-colors"><SvgIcon name="trash" className="w-4 h-4" /></button>
                            </div>
                          )
                        });
                      })()}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 강사 과목 추가 팝업 */}
          {isCategoryModalOpen && (
            <div className="fixed inset-0 bg-neutral-900/60 dark:bg-neutral-950/80 backdrop-blur-sm flex items-center justify-center p-4" style={{ zIndex: 9999 }}>
              <div className="bg-white dark:bg-neutral-900 rounded-xl border border-neutral-200 dark:border-neutral-800 p-5 w-full max-w-sm shadow-2xl">
                <div className="flex items-center justify-between border-b border-neutral-100 dark:border-neutral-800 pb-3 mb-4">
                  <h3 className="font-bold text-sm">강사 과목(전공) 관리</h3>
                  <button onClick={() => setIsCategoryModalOpen(false)} className="p-1 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-md text-neutral-400">
                    <SvgIcon name="close" className="w-4 h-4" />
                  </button>
                </div>
                <div className="space-y-4">
                  <div className="flex flex-wrap gap-2">
                    {categories.map((c, idx) => (
                      <span key={idx} className="px-2.5 py-1 text-xs font-bold bg-neutral-100 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-lg">{c}</span>
                    ))}
                  </div>
                  <form onSubmit={(e) => { e.preventDefault(); handleAddCategory(e.target.newCat.value); e.target.reset(); }} className="flex gap-2">
                    <input type="text" name="newCat" required placeholder="새 과목 입력" className="flex-1 px-3 py-1.5 bg-neutral-50 dark:bg-neutral-850 border border-neutral-200 dark:border-neutral-700 rounded-lg text-xs outline-none" />
                    <button type="submit" className="px-3 py-1.5 text-xs bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold shrink-0">추가</button>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* 시스템 로그인 모달 */}
          {isLoginModalOpen && (
            <div className="fixed inset-0 bg-neutral-900/70 backdrop-blur-sm flex items-center justify-center p-4" style={{ zIndex: 99990 }}>
              <div className="bg-white dark:bg-neutral-900 rounded-3xl border border-neutral-200 dark:border-neutral-800 p-6 md:p-8 w-full max-w-sm shadow-2xl relative overflow-hidden">
                <button onClick={() => setIsLoginModalOpen(false)} className="absolute top-4 right-4 p-2 text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-full transition-colors"><SvgIcon name="close" className="w-5 h-5" /></button>
                <div className="text-center mb-6 mt-2">
                  <div className="w-16 h-16 bg-neutral-100 dark:bg-neutral-800 rounded-2xl flex items-center justify-center mx-auto mb-4 text-neutral-600 dark:text-neutral-300"><SvgIcon name="users" className="w-8 h-8" /></div>
                  <h3 className="font-black text-xl text-neutral-800 dark:text-white">시스템 로그인</h3>
                </div>
                <form onSubmit={(e) => {
                  e.preventDefault();
                  const formData = new FormData(e.target);
                  const id = formData.get('id').trim();
                  const pw = formData.get('password').trim();
                  
                  if (id === '메이킹' && pw === adminPw) {
                    setIsAdmin(true); setLoggedInUser(null); setIsLoginModalOpen(false);
                    sessionStorage.setItem('mayking_isAdmin', 'true');
                    sessionStorage.removeItem('mayking_loggedInUser');
                    showToast("🔓 관리자 모드로 접속되었습니다."); return;
                  }

                  const matchedInstructor = instructors.find(i => i.id === id && i.password === pw);
                  if (matchedInstructor) {
                    const userData = { ...matchedInstructor, role: 'instructor' };
                    setLoggedInUser(userData); setIsAdmin(false); setIsLoginModalOpen(false); setCurrentView('student_dashboard');
                    sessionStorage.setItem('mayking_loggedInUser', JSON.stringify(userData));
                    sessionStorage.removeItem('mayking_isAdmin');
                    showToast(`👨‍🏫 환영합니다, ${matchedInstructor.name}T 강사님!`); return;
                  }

                  const matchedStudent = users.find(u => u.id === id && u.password === pw);
                  if (matchedStudent) {
                    const userData = { ...matchedStudent, role: 'student' };
                    setLoggedInUser(userData); setIsAdmin(false); setIsLoginModalOpen(false); setCurrentView('student_dashboard');
                    sessionStorage.setItem('mayking_loggedInUser', JSON.stringify(userData));
                    sessionStorage.removeItem('mayking_isAdmin');
                    showToast(`🧑‍🎓 환영합니다, ${matchedStudent.name} 학생!`); return;
                  }
                  
                  showToast("⚠️ 아이디 또는 비밀번호가 일치하지 않습니다.");
                }} className="space-y-4">
                  <input type="text" name="id" required className="w-full px-4 py-3.5 bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-xl text-sm font-semibold outline-none focus:border-indigo-500 transition-colors" placeholder="아이디 입력" />
                  <input type="password" name="password" required className="w-full px-4 py-3.5 bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-xl text-sm font-semibold outline-none focus:border-indigo-500 transition-colors" placeholder="비밀번호 입력" />
                  <button type="submit" className="w-full py-4 mt-2 bg-neutral-900 hover:bg-neutral-800 dark:bg-white dark:hover:bg-neutral-200 dark:text-neutral-900 text-white rounded-xl text-sm font-bold shadow-md transition-all active:scale-95">접속하기</button>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
